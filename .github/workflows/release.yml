name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub releases / tags
      pull-requests: write  # changesets opens "Version Packages" PR
      id-token: write       # npm provenance (--provenance flag)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # changesets needs full history for changelog

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release PR or Publish
        # When changesets are present: opens/updates a "Version Packages" PR.
        # When merged (no changesets left): publishes to npm automatically.
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add NPM_TOKEN secret in repo Settings → Secrets → Actions.
          # Generate at https://www.npmjs.com/settings/<username>/tokens
          # Token type: Granular Access Token or Classic Automation token.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
