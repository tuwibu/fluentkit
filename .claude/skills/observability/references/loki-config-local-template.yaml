# Loki single-binary config — LOCAL DEV: filesystem storage (no B2 credentials needed).
# Mounted via docker-compose.override.yml → overwrites /etc/loki/loki-config.yaml.
# Do NOT use in production — filesystem storage is not durable across host reboots
# without a bind-mount, and has no off-site backup.

auth_enabled: false  # single-tenant; auth enforced at Caddy bearer-token gate

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

limits_config:
  retention_period: 720h  # 30 days
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  reject_old_samples: true
  reject_old_samples_max_age: 24h
  max_label_names_per_series: 10
