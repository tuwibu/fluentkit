# LOCAL DEV ONLY — docker compose auto-merges this file; do NOT commit real secrets.
# Overrides:
#   grafana  → publish :3000 (no TLS, direct browser access)
#   loki     → filesystem storage (no B2 needed), loopback :3100 for API proxy
#   vm       → loopback :8428 for direct queries
#   caddy    → plain HTTP :9090 (no TLS/domain), agent push to localhost:9090
#
# Agent env (Go fleet or local test):
#   MP_TELEMETRY_ENDPOINT=http://localhost:9090
#   MP_TELEMETRY_TOKEN=$FLEET_PUSH_TOKEN

services:
  grafana:
    ports:
      - "3000:3000"

  loki:
    # loopback only — API reachable by app at LOKI_QUERY_URL=http://localhost:3100
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.local.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  victoriametrics:
    # loopback only — VM_QUERY_URL=http://localhost:8428
    ports:
      - "127.0.0.1:8428:8428"

  caddy:
    ports: !override
      - "9090:9090"
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
