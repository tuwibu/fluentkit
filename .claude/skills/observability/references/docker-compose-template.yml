name: {{PROJECT_SLUG}}-observability

# ── Prod compose — local dev uses docker-compose.override.yml (auto-merged) ──
# Run: docker compose up -d
# Secrets: copy .env.example → .env and fill all values before starting.

services:
  loki:
    image: grafana/loki:3.4.2
    command:
      - -config.file=/etc/loki/loki-config.yaml
      - -config.expand-env=true           # allows ${VAR} in loki-config.yaml
    environment:
      B2_ENDPOINT: ${B2_ENDPOINT}
      B2_BUCKET: ${B2_BUCKET}
      B2_ACCESS_KEY_ID: ${B2_ACCESS_KEY_ID}
      B2_SECRET_ACCESS_KEY: ${B2_SECRET_ACCESS_KEY}
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks: [obs]
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    command:
      - -retentionPeriod=90d
      - -storageDataPath=/storage
    volumes:
      - vm-data:/storage
    networks: [obs]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Set true ONLY if admin UI embeds dashboards via iframe
      GF_SECURITY_ALLOW_EMBEDDING: ${GRAFANA_ALLOW_EMBEDDING:-false}
      # Telegram alerting — MUST be non-empty or Grafana crash-loops at startup.
      # Local dev: use dummy strings, e.g. "000000:local-dummy-token" / "local-dummy"
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID}
      # Postgres datasource (read-only, rollup tables only)
      GRAFANA_PG_HOST: ${GRAFANA_PG_HOST}
      GRAFANA_PG_PORT: ${GRAFANA_PG_PORT}
      GRAFANA_PG_DB: ${GRAFANA_PG_DB}
      GRAFANA_PG_PASSWORD: ${GRAFANA_PG_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [obs]
    restart: unless-stopped

  caddy:
    image: caddy:2.9
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      FLEET_PUSH_TOKEN: ${FLEET_PUSH_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [obs]
    restart: unless-stopped

networks:
  obs:

volumes:
  loki-data:
  vm-data:
  grafana-data:
  caddy-data:
  caddy-config:
